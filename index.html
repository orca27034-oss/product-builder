<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Minesweeper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Minesweeper</h1>
        
        <div class="difficulty-selector">
            <button class="diff-btn active" data-level="beginner">Beginner</button>
            <button class="diff-btn" data-level="intermediate">Intermediate</button>
            <button class="diff-btn" data-level="expert">Expert</button>
        </div>

        <div class="status-bar">
            <div class="status-item">
                <span id="mine-count">010</span>
                <p>Mines</p>
            </div>
            <button id="reset-btn">😊</button>
            <div class="status-item">
                <span id="timer">000</span>
                <p>Time</p>
            </div>
        </div>

        <div id="game-board" class="board beginner">
            <!-- Grid generated by JS -->
        </div>

        <div class="instructions">
            <p>🖱️ <b>Left Click</b> to Reveal | 🚩 <b>Right Click</b> to Flag</p>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
