<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPS Tester - How fast can you click?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>CPS Tester</h1>
        
        <div class="settings">
            <button class="time-btn active" data-time="5">5s</button>
            <button class="time-btn" data-time="10">10s</button>
            <button class="time-btn" data-time="15">15s</button>
        </div>

        <div class="stats-board">
            <div class="stat">
                <span id="timer">5.00</span>
                <p>Time Left</p>
            </div>
            <div class="stat">
                <span id="click-count">0</span>
                <p>Total Clicks</p>
            </div>
            <div class="stat">
                <span id="cps-display">0.0</span>
                <p>CPS</p>
            </div>
        </div>

        <div id="click-area" class="click-area">
            <span>Click Here to Start!</span>
        </div>

        <button id="reset-btn">Reset</button>

        <div id="result-modal" class="modal">
            <div class="modal-content">
                <h2>Test Finished!</h2>
                <div class="final-score">
                    <div class="score-item">
                        <span id="final-cps">0.0</span>
                        <p>CPS</p>
                    </div>
                    <div class="score-item">
                        <span id="final-clicks">0</span>
                        <p>Total Clicks</p>
                    </div>
                </div>
                <p id="rank-text"></p>
                <button id="close-modal">Try Again</button>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
