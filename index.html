<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 뭐 먹지? - 저녁 메뉴 추천</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>🍱 오늘 저녁 뭐 먹지?</h1>
            <p>고민되는 저녁 메뉴, 대신 골라드릴게요!</p>
        </header>

        <main>
            <section class="category-section">
                <div class="category-chips">
                    <button class="chip active" data-category="all">전체</button>
                    <button class="chip" data-category="korean">한식</button>
                    <button class="chip" data-category="japanese">일식</button>
                    <button class="chip" data-category="chinese">중식</button>
                    <button class="chip" data-category="western">양식</button>
                    <button class="chip" data-category="simple">간편식</button>
                </div>
            </section>

            <section class="action-section">
                <button id="recommend-btn" class="main-btn">메뉴 추천받기 🎲</button>
            </section>

            <section id="result-section" class="result-section hidden">
                <div class="result-card">
                    <div class="menu-label" id="menu-category">한식</div>
                    <h2 id="menu-name">비빔밥</h2>
                    <p id="menu-desc">신선한 나물과 고추장의 조화, 건강한 한 끼!</p>
                </div>
            </section>
        </main>

        <footer>
            <p>© 2026 저녁 추천 가이드</p>
        </footer>
    </div>
    <script src="main.js?v=1.1" defer></script>
</body>
</html>
