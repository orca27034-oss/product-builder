<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game - Classic Fun</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Snake Game</h1>
            <div class="score-container">
                <div class="score-box">
                    <p>Score</p>
                    <span id="score">0</span>
                </div>
                <div class="score-box">
                    <p>Best</p>
                    <span id="high-score">0</span>
                </div>
            </div>
        </div>

        <div id="game-board-container">
            <canvas id="game-board" width="400" height="400"></canvas>
            <div id="game-overlay" class="overlay">
                <div class="overlay-content">
                    <h2 id="overlay-title">Ready?</h2>
                    <p id="overlay-msg">Press Start to Play!</p>
                    <button id="start-btn">Start Game</button>
                </div>
            </div>
        </div>

        <div class="controls-guide">
            <p>Use <b>Arrow Keys</b> or <b>WASD</b> to move</p>
        </div>

        <!-- Mobile Controls -->
        <div class="mobile-controls">
            <button id="up-btn" class="ctrl-btn">↑</button>
            <div class="side-ctrls">
                <button id="left-btn" class="ctrl-btn">←</button>
                <button id="down-btn" class="ctrl-btn">↓</button>
                <button id="right-btn" class="ctrl-btn">→</button>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
