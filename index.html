<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Rock Paper Scissors</h1>
        
        <div class="score-board">
            <div class="score">
                <span id="user-score">0</span>
                <p>You</p>
            </div>
            <div class="score">
                <span id="comp-score">0</span>
                <p>Computer</p>
            </div>
        </div>

        <div class="game-area">
            <div class="choices">
                <button class="choice" id="rock">✊</button>
                <button class="choice" id="paper">✋</button>
                <button class="choice" id="scissors">✌️</button>
            </div>
            
            <div class="display-area">
                <div class="result-text" id="result">Pick your move!</div>
                <div class="choices-display">
                    <div class="player-move">
                        <p>You</p>
                        <div id="user-choice-display" class="move-icon">-</div>
                    </div>
                    <div class="player-move">
                        <p>Computer</p>
                        <div id="comp-choice-display" class="move-icon">-</div>
                    </div>
                </div>
            </div>
        </div>

        <button id="reset-btn">Reset Game</button>
    </div>
    <script src="main.js"></script>
</body>
</html>
