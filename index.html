<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Hub - Minesweeper & Snake</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-switcher">
        <button class="switch-btn active" data-game="minesweeper">Minesweeper</button>
        <button class="switch-btn" data-game="snake">Snake</button>
    </div>

    <div id="minesweeper-game" class="game-container active">
        <div class="container">
            <h1>Minesweeper</h1>
            
            <div class="difficulty-selector">
                <button class="diff-btn active" data-level="beginner">Beginner</button>
                <button class="diff-btn" data-level="intermediate">Intermediate</button>
                <button class="diff-btn" data-level="expert">Expert</button>
            </div>

            <div class="status-bar">
                <div class="status-item">
                    <span id="mine-count">010</span>
                    <p>Mines</p>
                </div>
                <button id="reset-btn">😊</button>
                <div class="status-item">
                    <span id="timer">000</span>
                    <p>Time</p>
                </div>
            </div>

            <div id="game-board" class="board beginner">
                <!-- Grid generated by JS -->
            </div>

            <div class="instructions">
                <p>🖱️ <b>Left Click</b> to Reveal | 🚩 <b>Right Click</b> to Flag</p>
            </div>
        </div>
    </div>

    <div id="snake-game" class="game-container">
        <div class="container">
            <h1>Snake Game</h1>
            <div class="status-bar">
                <div class="status-item">
                    <span id="snake-score">000</span>
                    <p>Score</p>
                </div>
                <button id="snake-reset-btn">🔄</button>
                <div class="status-item">
                    <span id="snake-high-score">000</span>
                    <p>Best</p>
                </div>
            </div>
            <div class="snake-board-container">
                <canvas id="snake-canvas" width="400" height="400"></canvas>
            </div>
            <div class="instructions">
                <p>⌨️ Use <b>Arrow Keys</b> or <b>WASD</b> to Move</p>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
